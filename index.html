<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- descrição do projeto -->

    <meta name="description" content="Dashboard para gerenciamento de biblioteca, onde o bibliotecário pode cadastrar livros, gerenciar empréstimos e devoluções, e visualizar relatórios de atividades.">
    <meta name="author" content="Giovanna Negreiros Santos">

    <meta name="keywords" content="biblioteca, livros, gestão, sistema">
    <meta name="robots" content="index, follow">

    <!-- links css -->
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/theme_toggle.css">
    <link rel="stylesheet" href="./css/style.css">

    

    <!-- links fontes e favicon -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <title>Dashboard - Sistema de Biblioteca</title>

</head>
<body class="dashboard-body">
    
    <!-- cabeçalho do projeto -->

   <header class="navbar">
        <div class="logo">
            <i class="ph ph-books"></i>
            <span>BiblioTech</span>
        </div>
        
        <div class="theme-toggle" style="position: relative; top: 0; right: 0;">
            <label class="theme-switch" for="checkbox">
                <input type="checkbox" id="checkbox" />
                <div class="slider-round">
                    <i class="ph ph-sun"></i>
                    <i class="ph ph-moon"></i>
                </div>          
            </label>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Dashboard</a></li>
                <li><a href="./pages/books_register.html">Livros</a></li>
                <li><a href="./pages/student_register.html">Estudantes</a></li>
                <li><a href="./pages/librarian_register.html">Equipe</a></li>
                <li><a href="./pages/contact.html">Contato</a></li> </ul>
        </nav>

        
        <a href="./pages/login.html" class="btn-logout">Sair</a>
    </header>


    <!-- conteúdo principal do projeto -->

    <main class="dashboard-container">
        <section class="welcome-section">
            <h1> Bem-vindo ao Painel da Biblioteca</h1>
            <p>Faça a gestão de acervos, utilizadores e equipe administrativa de forma simples e rápida.</p>
        </section>
        
    </main>

    
    <script type="module" src="./js/main.js"></script>

    <script type="module" src="./js/main.js"></script>


</body>
</html>
