<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/theme_toggle.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <title>Login - Sistema de Biblioteca</title>
</head>
<body class="auth-page">

    <div class="theme-toggle">
        <label class="theme-switch" for="checkbox">

            <input type="checkbox" id="checkbox" />

            <div class="slider-round">
                <i class="ph ph-sun"></i>
                <i class="ph ph-moon"></i>
            </div>          
        </label>
    </div>

    <div class="image-left">
        <img src="../public/images/login.svg" alt="Login Illustration">
    </div>

    <div class="right-container">
        <div class="right-register">
            <h1>Login</h1>

            <form id="login_form">
                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Email
                        <i class="ph ph-envelope"></i>
                    </label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
    
                    <label for="password">Senha
                        <i class="ph ph-lock"></i>
                    </label>

                    <i class="ph ph-eye-slash" 
                        id="btn-senha" style="display: none; cursor: pointer; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); z-index: 10; color: var(--text-secondary);">
                    </i>
                </div>                    

                <div class="forgot-password">
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-primary">Entrar</button>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>

    <script type="module" src="../js/main.js"></script>

</body>
</html>
