<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <title>Cadastro do Estudante</title>
</head>

<body class="auth-page">

    <header class="auth-header">
       
        <a href="../index.html" class="btn-back">Voltar ao Painel</a>
    
    </header>
    
    <div class="image-left">
        <img src="../public/images/student.svg" alt="Student Register Illustration">
    </div>

    <div class="right-container">
        <div class="right-register">
            <form id="student_register">
                <h1>Cadastro do Estudante</h1>

                <div class="input-group">
                    <input type="text" id="name" name="name" placeholder=" " required>
                    <label for="name" class="label">
                        Nome Completo
                        <i class=" ph ph-user"></i>
                    </label>
                </div>
                <div class="input-group">
                    <input type="text" id="cpf" name="cpf" maxlength="14" placeholder=" " required>
                    <label for="cpf" class="label">
                        CPF
                        <i class=" ph ph-identification-card"></i>
                    </label>
                </div>
                <div class="input-group">
                    <input type="email" id="email" name="email" placeholder=" " required>
                    <label for="email" class="label">
                        Email
                        <i class=" ph ph-envelope"></i>
                    </label>
                </div>
                <div class="input-group">
                    <input type="tel" id="phone" name="phone" placeholder=" " required>
                    <label for="phone" class="label">
                        Telefone
                        <i class=" ph ph-phone"></i>
                    </label>
                </div>
                <div class="input-group">
                    <input type="text" id="course" name="course" placeholder=" " required>
                    <label for="course" class="label">
                        Curso
                        <i class=" ph ph-graduation-cap"></i>
                    </label>
                </div>
                <div class="btn-pr">
                    <button type="submit" class="btn">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>

    <script type="module" src="../js/main.js"></script>
    
</body>
</html>
