<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <title>Cadastro de Livro</title>
</head>



<body class="auth-page">
    
    <header class="auth-header">
        
        <a href="../index.html" class="btn-back">Voltar ao Painel</a>
    
    </header>
    
    <div class="image-in-left">

        <img src="../public/images/book.svg" alt="Books Register Illustration">
    </div>

    <div class="right-container">
        <div class="right-register">
            <h1>Cadastro de Livro</h1>
            <form action="#" id="books_register">

            <div class="input-box">
                <input type="text" id="title" name="title" placeholder=" " required>
                <label for="title" class="label">
                    Título do Livro
                    <i class="ph ph-book-open"></i>
                </label>
            </div>
        
            <div class="input-box">
                <input type="text" id="author" name="author" placeholder=" " required>
                <label for="author" class="label">
                    Autor do Livro
                    <i class="ph ph-user"></i>
                </label>
            </div>
            <div class="input-box">
                <input type ="text" id="publisher" name="publisher" placeholder=" " required>
                <label for="publisher" class="label">
                    Editora do Livro
                    <i class="ph ph-building"></i>
                </label>
            </div>

            <div class="input-box">
                <input type="text" id="year" name="year" placeholder=" " required>
                <label for="year" class="label">
                    Ano de Publicação
                    <i class="ph ph-calendar"></i>
                </label>
            </div>

            <div class="input-box">
                <input type="text" id="isbn" name="isbn" placeholder=" " required>
                <label for="isbn" class="label">
                    ISBN do Livro
                    <i class="ph ph-barcode"></i>
            </label>
            </div>
   
            <div class="input-box">
                <input type="number" id="copies" name="copies" placeholder=" " required>
                <label for="copies" class="label">
                    Exemplares disponíveis
                    <i class="ph ph-books"></i>
                </label>
            </div>

            <button type="submit" class="btn">Cadastrar Livro</button>

        </form>
        </div>
    </div>

   <script src="../js/api.js"></script>

    <script type="module" src="../js/main.js"></script>

</body>
</html>
