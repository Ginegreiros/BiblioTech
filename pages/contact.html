<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contato | BiblioTech</title>

    <meta name="description" content="Página de contato do sistema BiblioTech">
    <meta name="keywords" content="biblioteca, contato, livros">
    <meta name="author" content="Seu Nome">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/global.css">


</head>


<body>
    
    <header class="auth-header">
        
        <a href="../index.html" class="btn-back">Voltar ao Painel</a>
    </header>

    <main class="container-contact">

        <h1>Entre em Contato</h1>

        <form id="contactForm">

            <input 
                type="text" 
                id="name" 
                placeholder="Seu nome"
                required
            >

            <input 
                type="email" 
                id="email" 
                placeholder="Seu email"
                required
            >

            <textarea 
                id="message"
                placeholder="Digite sua mensagem"
                required
            ></textarea>

            <button type="submit">
                Enviar
            </button>

        </form>

    </main>

    
    <script src="../js/api.js"></script>

    <script type="module" src="../js/main.js"></script>



</body>
</html>
